site_name: erpc.py
site_url: https://tars-endurance.github.io/erpc.py
site_description: Python subprocess manager for eRPC — fault-tolerant EVM RPC proxy
repo_url: https://github.com/tars-endurance/erpc.py
repo_name: tars-endurance/erpc.py
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Process Management: process-management.md
  - Monitoring: monitoring.md
  - CLI Reference: cli.md
  - API Reference:
    - api/index.md
    - api/config.md
    - api/process.md
    - api/docker.md
    - api/client.md
    - api/monitoring.md
    - api/install.md
    - api/auth.md
    - api/database.md
    - api/failsafe.md
    - api/rate-limiters.md
    - api/networks.md
    - api/upstreams.md
    - api/providers.md
    - api/server.md
    - api/dynamic.md
    - api/exceptions.md
    - api/cli.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true
