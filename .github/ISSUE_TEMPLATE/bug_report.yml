name: Bug Report
description: Report a bug in erpc.py
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal steps to reproduce.
      placeholder: |
        1. Create config with ...
        2. Start process ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include tracebacks if applicable.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      description: Which module is involved?
      options:
        - erpc/process.py
        - erpc/async_process.py
        - erpc/docker.py
        - erpc/config.py
        - erpc/server.py
        - erpc/networks.py
        - erpc/providers.py
        - erpc/upstreams.py
        - erpc/failsafe.py
        - erpc/rate_limiters.py
        - erpc/database.py
        - erpc/auth.py
        - erpc/client.py
        - erpc/monitoring.py
        - erpc/dynamic.py
        - erpc/install.py
        - erpc/cli.py
        - Other / Unknown
    validations:
      required: true

  - type: textarea
    id: test_expectations
    attributes:
      label: Test Expectations
      description: What test(s) should be added or updated to catch this?
      placeholder: "e.g., Add test in test_process.py that verifies timeout behavior when binary is missing"
    validations:
      required: false

  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: "3.12"
    validations:
      required: false

  - type: input
    id: erpc_version
    attributes:
      label: eRPC Binary Version
      placeholder: "0.0.49"
    validations:
      required: false
