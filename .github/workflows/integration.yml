name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install eRPC binary (pinned version from erpc.ERPC_VERSION)
        run: |
          ERPC_VERSION=$(python -c "from erpc import ERPC_VERSION; print(ERPC_VERSION)")
          echo "Installing eRPC v${ERPC_VERSION}"
          curl -fSL "https://github.com/erpc/erpc/releases/download/${ERPC_VERSION}/erpc_linux_x86_64" \
            -o /tmp/erpc-binary
          chmod +x /tmp/erpc-binary
          sudo mv /tmp/erpc-binary /usr/local/bin/erpc
          erpc --version || echo "eRPC v${ERPC_VERSION} installed"

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v -m integration --no-header
